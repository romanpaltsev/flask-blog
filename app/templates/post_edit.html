{% extends 'base.html' %}

{% block title %}
Редактирование статьи
{% endblock %}

{% block body %}
<section class="page-section">
    <div class="container narrow-container">
        <div class="form-heading">
            <span class="section-kicker">Правка материала</span>
            <h1>Редактирование статьи</h1>
        </div>
        <form method="post" class="editor-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% if errors %}
                <div class="alert alert-danger" role="alert">
                    {% for error in errors %}
                        <div>{{ error }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <div class="form-floating">
                <input type="text" name="title" id="title" class="form-control" placeholder="Название статьи" value="{{ article.title }}">
                <label for="title">Название статьи</label>
            </div>
            <div class="form-floating">
                <textarea name="intro" id="intro" class="form-control form-control-short" placeholder="Короткое описание">{{ article.intro }}</textarea>
                <label for="intro">Короткое описание</label>
            </div>
            <div class="form-floating">
                <textarea name="text" id="text" class="form-control form-control-tall" placeholder="Основной текст">{{ article.text }}</textarea>
                <label for="text">Основной текст</label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check2"></i>
                    <span>Сохранить</span>
                </button>
                <a href="{{ url_for('posts.post_detail', id=article.id) }}" class="btn btn-outline-dark">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
