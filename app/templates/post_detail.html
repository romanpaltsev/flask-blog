{% extends 'base.html' %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block body %}
<section class="page-section">
    <div class="container narrow-container">
        <article class="post-detail">
            <a href="{{ url_for('posts.posts') }}" class="back-link">
                <i class="bi bi-arrow-left"></i>
                <span>К списку статей</span>
            </a>
            <time datetime="{{ article.date.date() }}">{{ article.date.strftime('%d.%m.%Y') }}</time>
            <h1>{{ article.title }}</h1>
            <p class="post-intro">{{ article.intro }}</p>
            <div class="post-content">
                <p>{{ article.text }}</p>
            </div>
        </article>
        <div class="post-actions">
            <a href="{{ url_for('posts.post_update', id=article.id) }}" class="btn btn-success">
                <i class="bi bi-pencil-square"></i>
                <span>Редактировать</span>
            </a>
            <form method="post" action="{{ url_for('posts.post_delete', id=article.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i>
                    <span>Удалить</span>
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
