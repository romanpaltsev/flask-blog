{% extends 'base.html' %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block body %}
<div class="container mt-5">
    <div class="card article">
        <h5 class="card-header">
            {{ article.title }}
        </h5>
        <div class="card-body">
            <p class="card-text">{{ article.text }}</p>
        </div>
        <div class="card-footer text-muted">
            Дата публикации: {{ article.date.date() }}
            <a href="{{ url_for('posts.post_update', id=article.id) }}" class="btn btn-success">Редактировать</a>
            <form method="post" action="{{ url_for('posts.post_delete', id=article.id) }}" class="d-inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn btn-danger">Удалить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
