services:
  web:
    build: .
    command: sh -c "uv run python create_db.py && uv run flask --app app --debug run --host 0.0.0.0 --port 5000"
    environment:
      DATABASE_URL: postgresql+psycopg://flask_blog:flask_blog@db:5432/flask_blog
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flask_blog
      POSTGRES_USER: flask_blog
      POSTGRES_PASSWORD: flask_blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask_blog -d flask_blog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
